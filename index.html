<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
</head>
<body>

<h2>Registration Form</h2>

<form>
  <label for="name">Name</label><br>
  <input id="name" name="name" type="text" placeholder="Name" required><br><br>
  <label for="email">Email</label><br>
  <input id="email" name="email" type="email" placeholder="Email" required><br><br>
  <label for="password">Password</label><br>
  <input id="password" name="password" type="password" placeholder="Password" minlength="8" required><br><br>
  <button type="submit">Register</button>
</form>

</body>
</html>
